
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    appName: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      appName: frontend
  template:
    metadata:
      labels:
        appName: frontend
    spec:
      containers:
        - name: frontend
          image: 00915316788.dkr.ecr.us-east-1.amazonaws.com/frontend
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service
data:
  DB_HOST: "wmp-dev.c4j048gm8kgc.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_USER: "auth_svc_user"
  DB_PASSWORD: "localdev123"
  DB_NAME: "wmp"
  DB_SCHEMA: "auth_schema"
  SERVER_PORT: "8081"
  JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
  PORTFOLIO_SERVICE_URL: "http://portfolio-service:8080"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    appName: auth-service
spec:
  replicas: 3
  selector:
    matchLabels:
      appName: auth-service
  template:
    metadata:
      labels:
        appName: auth-service
    spec:
      containers:
        - name: auth-service
          image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/auth-service
          envFrom:
            - configMapRef:
                name: auth-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-service
data:
  SPRING_PROFILES_ACTIVE: "production"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://wmp-dev.c4j048gm8kgc.us-east-1.rds.amazonaws.com:5432/wmp?currentSchema=portfolio_schema"
  SPRING_DATASOURCE_USERNAME: "portfolio_svc_user"
  SPRING_DATASOURCE_PASSWORD: "localdev123"
  JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
  SERVER_PORT: "8080"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  labels:
    appName: portfolio-service
spec:
  replicas: 3
  selector:
    matchLabels:
      appName: portfolio-service
  template:
    metadata:
      labels:
        appName: portfolio-service
    spec:
      containers:
        - name: portfolio-service
          image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/portfolio-service
          envFrom:
            - configMapRef:
                name: portfolio-service


---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service
data:
  DATABASE_URL: "postgresql+asyncpg://analytics_svc_user:localdev123@wmp-dev.c4j048gm8kgc.us-east-1.rds.amazonaws.com:5432/wmp"
  DB_SCHEMA: "analytics_schema"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  labels:
    appName: analytics-service
spec:
  replicas: 3
  selector:
    matchLabels:
      appName: analytics-service
  template:
    metadata:
      labels:
        appName: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/analytics-service
          envFrom:
            - configMapRef:
                name: analytics-service
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    appName: frontend
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 80 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    appName: auth-service
  ports:
    - protocol: TCP
      port: 8081 #service port
      targetPort: 8081 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
spec:
  selector:
    appName: portfolio-service
  ports:
    - protocol: TCP
      port: 8080 #service port
      targetPort: 8080 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    appName: analytics-service
  ports:
    - protocol: TCP
      port: 8000 #service port
      targetPort: 8000 #target port
