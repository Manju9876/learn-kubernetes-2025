apiVersion: v1
kind: Pod
metadata:
  name: frontend
  label:
    appName: frontend
spec:
  containers:
    - name: frontend
      image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/frontend
      ports:
        - containerPort: 80

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service
data:
  DB_HOST: "wmp-dev.c4j048gm8kgc.us-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_USER: "auth_svc_user"
  DB_PASSWORD: "localdev123"
  DB_NAME: "wmp"
  DB_SCHEMA: "auth_schema"
  SERVER_PORT: "8081"
  JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
  PORTFOLIO_SERVICE_URL: "http://portfolio-service-dev.devopsbymanju.shop:8080"

---
apiVersion: v1
kind: Pod
metadata:
  name: auth-service
  label:
    appName: auth-service
spec:
  containers:
    - name: auth-service
      image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/auth-service
      envFrom:
        - configMapRef:
            name: auth-service

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-service
data:
  SPRING_PROFILES_ACTIVE: "production"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://wmp-dev.c4j048gm8kgc.us-east-1.rds.amazonaws.com:5432/wmp?currentSchema=portfolio_schema"
  SPRING_DATASOURCE_USERNAME: "portfolio_svc_user"
  SPRING_DATASOURCE_PASSWORD: "localdev123"
  JWT_SECRET: "myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm"
  SERVER_PORT: "8080"
---

apiVersion: v1
kind: Pod
metadata:
  name: portfolio-service
  label:
    appName: portfolio-service
spec:
  containers:
    - name: portfolio-service
      image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/portfolio-service
      envFrom:
        - configMapRef:
            name: portfolio-service

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-service
data:
  DATABASE_URL: "postgresql+asyncpg://analytics_svc_user:localdev123wmp-dev.c4j048gm8kgc.us-east-1.rds.amazonaws.com:5432/wmp"
  DB_SCHEMA: "analytics_schema"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
---
apiVersion: v1
kind: Pod
metadata:
  name: analytics-service
  label:
    appName: analytics-service
spec:
  containers:
    - name: analytics-service
      image: 200915316788.dkr.ecr.us-east-1.amazonaws.com/analytics-service
      envFrom:
        - configMapRef:
            name: analytics-service

---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  type: LoadBalancer
  selector:
    appName: frontend
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 80 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    appName: auth-service
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 9376 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    appName: portfolio-service
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 9376 #target port
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    appName: analytics-service
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 9376 #target port
---