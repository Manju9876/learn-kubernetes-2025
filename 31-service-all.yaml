apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    app: MyApp
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 9376 #target port
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: MyApp
spec:
  containers:
    - name: nginx
      image: nginx:stable
      ports:
        - containerPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: debug
spec:
  containers:
    - name: redhat
      image: rkalluru/learnk8s:rhel9-bare

---
apiVersion: v1
kind: Service
metadata:
  name: service-np
spec:
  type: NodePort
  selector:
    app: MyApp
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port

---
---
apiVersion: v1
kind: Service
metadata:
  name: service-lb
spec:
  type: LoadBalancer
  selector:
    topic: services
  ports:
    - protocol: TCP
      port: 80 # Service Port
      targetPort: 80 # Container Port
---
apiVersion: v1
kind: Service
metadata:
  name: service-en
spec:
  type: ExternalName
  externalName: www.columbia.edu
